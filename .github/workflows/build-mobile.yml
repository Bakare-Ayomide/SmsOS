# CI/CD Workflow to build Android APK using React & Capacitor
name: Build Mobile Application

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies
        run: npm install

      - name: Compile React Frontend Assets
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_SERVER_URL: ${{ secrets.SaaS_API_SERVER_URL }}

      - name: Install Capacitor CLI & Platform
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "Android Cellular SMS Gateway" "com.smsgateway.saas.client" --web-dir=dist

      - name: Add Android Native Platform
        run: npx cap add android

      - name: Sync Web Directory with Android Container
        run: npx cap sync android

      - name: Build Android APK with Gradle Wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Copy Compiled APK to Project Root Folders
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/sms-os-gateway.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/sms-os-gateway.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk sms-os-gateway.apk

      - name: Commit and Push Compiled APK back to Repository
        run: |
          git config --global user.name "SMS-OS CI Compiler"
          git config --global user.email "ci@sms-os.io"
          git add public/sms-os-gateway.apk public/downloads/sms-os-gateway.apk sms-os-gateway.apk
          git commit -m "chore(ci): compile and publish latest Android APK [skip ci]" || echo "No compiled APK changes to commit"
          git push origin HEAD:${{ github.ref_name }} || echo "Could not push back to repo automatically (verify GitHub Action write permissions)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellular-sms-gateway-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
